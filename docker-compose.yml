services:
  db:
    image: postgis/postgis:14-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: toto
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - ./docker_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - ./docker_data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    working_dir: /workspace
    entrypoint: ["sh", "/workspace/vlm_runtime/llama_cpp/start_llama_server.sh"]
    environment:
      LLAMA_MODEL_REPO: LiquidAI/LFM2.5-VL-1.6B-GGUF
      LLAMA_MODEL_QUANT: Q8_0
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 8081
      LLAMA_CTX_SIZE: 32768
      LLAMA_PARALLEL: 1
      LLAMA_THREADS: 4
    ports:
      - "8081:8081"
    volumes:
      - .:/workspace
      - llama_hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: toto
      POSTGRES_DB: app
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: infrastructure-evidence
      SECRET_KEY: dev-secret-key-change-in-production
      DEV_MODE: "true"
      VLM_BASE_URL: http://vlm-gateway:8090
      VLM_TIMEOUT_SECONDS: "240"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      vlm-gateway:
        condition: service_started
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-pk.eyJ1Ijoic2hyYXZubiIsImEiOiJjbWw5aG5mbTYwMndqM2RzMnd1MDl0NGE2In0.bRfMCZHSMWhaEOknfVSxSA}
    ports:
      - "3011:80"
    depends_on:
      - backend

  vlm-gateway:
    build:
      context: .
      dockerfile: vlm_gateway/Dockerfile
    environment:
      VLM_REDIS_URL: redis://redis:6379/0
      LLAMA_SERVER_URL: http://llama-server:8081/v1/chat/completions
      VLM_MODEL_ID: LiquidAI/LFM2.5-VL-1.6B-GGUF
      VLM_MODEL_QUANTIZATION: Q8_0
      LLAMA_TIMEOUT_SECONDS: "180"
      VLM_RESULT_TIMEOUT_SECONDS: "240"
      VLM_MAX_QUEUE_SIZE: "8"
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
      llama-server:
        condition: service_started

volumes:
  llama_hf_cache:
